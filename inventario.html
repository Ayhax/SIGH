    <script src="auth_check.js"></script>

    <script>
        // --- Catálogo de módulos del sistema ---
        // OJO: 'nombre' debe coincidir exactamente con lo que el servidor envía en usuarioLogueado.modulos
        // (ver server.js: GROUP_CONCAT(DISTINCT m.nombre) as modulos_nombres)
        const CATALOGO_MODULOS = [
            { nombre: 'SCIL', titulo: 'Inventario',              desc: 'Sistema de Control de Inventario Logístico',      icono: 'ti-boxes',              url: 'inventario.html' },
            { nombre: 'CAF',  titulo: 'Activos Fijos',           desc: 'Control de Activos Fijos',                        icono: 'ti-building-warehouse', url: 'patrimonio.html' },
            { nombre: 'SCIP', titulo: 'Control Interno',         desc: 'Sistema de control Interno de Productos',         icono: 'ti-shield-check',       url: 'admin.html' },
            { nombre: 'GUH',  titulo: 'Gestión de Usuarios',     desc: 'Gestión de Usuarios y Herramientas',              icono: 'ti-users',              url: 'usuario.html' },
            { nombre: 'CPF',  titulo: 'Prod. Farmacéuticos',     desc: 'Control de Productos Farmacéuticos',              icono: 'ti-vaccine',            url: 'admin.html' },
            { nombre: 'MR',   titulo: 'Reportes',                desc: 'Módulo de Reportes',                              icono: 'ti-report',             url: 'admin.html' },
        ];

        // Esta página (inventario.html) corresponde siempre al módulo SCIL
        const MODULO_ACTUAL = 'SCIL';

        // Usuario logueado (se llena en el DOMContentLoaded de más abajo)
        let usuarioLogueado = null;

        // Pinta el listado del toggle de módulos usando SOLO los módulos
        // que vienen en usuarioLogueado.modulos (asignados por su rol en el servidor)
        function pintarModulosDropdown() {
            const modulosPermitidos = (usuarioLogueado && usuarioLogueado.modulos) || [];
            const listado = document.getElementById('modulosListado');
            const nombreActualSpan = document.getElementById('nombreModuloActual');

            // Etiqueta del módulo actual (esta página)
            const infoActual = CATALOGO_MODULOS.find(m => m.nombre === MODULO_ACTUAL);
            nombreActualSpan.textContent = infoActual ? infoActual.titulo : MODULO_ACTUAL;

            // Filtramos el catálogo completo dejando solo los módulos asignados al usuario
            const modulosAsignados = CATALOGO_MODULOS.filter(m => modulosPermitidos.includes(m.nombre));

            listado.innerHTML = '';

            if (modulosAsignados.length === 0) {
                listado.innerHTML = '<div class="modulos-vacio">No tienes otros módulos asignados.</div>';
                return;
            }

            modulosAsignados.forEach(m => {
                const esActual = m.nombre === MODULO_ACTUAL;
                const item = document.createElement(esActual ? 'div' : 'a');
                if (!esActual) item.href = m.url;
                item.className = 'modulo-item' + (esActual ? ' activo' : '');
                item.innerHTML = `
                    <div class="modulo-icono"><i class="ti ${m.icono}"></i></div>
                    <div class="modulo-texto">
                        <span class="modulo-titulo">${m.titulo}</span>
                        <span class="modulo-desc">${m.desc}</span>
                    </div>`;
                listado.appendChild(item);
            });
        }

        // Interactividad del dropdown de Perfil de Usuario
        const userMenuWrapper = document.getElementById('userMenuWrapper');
        const userDropdown = document.getElementById('userDropdown');

        if (userMenuWrapper) {
            userMenuWrapper.addEventListener('click', function(event) {
                event.stopPropagation();
                userDropdown.classList.toggle('show');
            });
        }

        // Interactividad del dropdown de Módulos (Apps Grid)
        const btnModulos = document.getElementById('btnModulos');
        const modulosDropdown = document.getElementById('modulosDropdown');

        if (btnModulos) {
            btnModulos.addEventListener('click', function(event) {
                event.stopPropagation();
                modulosDropdown.classList.toggle('show');
            });
        }

        // Cierre de menús al hacer clic fuera de ellos
        document.addEventListener('click', function(event) {
            if (userDropdown && !userMenuWrapper.contains(event.target)) {
                userDropdown.classList.remove('show');
            }
            if (modulosDropdown && !document.getElementById('modulosWrapper').contains(event.target)) {
                modulosDropdown.classList.remove('show');
            }
        });

        // Función unificada para limpiar el localStorage y redirigir
        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Renderizado automático de datos del usuario logueado en tiempo real
        document.addEventListener('DOMContentLoaded', () => {
            const datosUsuario = localStorage.getItem('usuario');
            if (datosUsuario) {
                try {
                    usuarioLogueado = JSON.parse(datosUsuario);
                    // Si tienes campos estructurados como nombres o rol_nombre en tu backend:
                    if (usuarioLogueado.nombres) {
                        document.getElementById('userNameDisplay').innerText = `${usuarioLogueado.nombres} ${usuarioLogueado.apellidos || ''}`.trim();
                    }
                    if (usuarioLogueado.rol_nombre || usuarioLogueado.role) {
                        document.getElementById('userRoleDisplay').innerText = usuarioLogueado.rol_nombre || usuarioLogueado.role;
                    }
                    // Pintar el toggle de módulos con SOLO los módulos que el usuario tiene asignados
                    pintarModulosDropdown();
                } catch (e) {
                    console.error("Error parseando los datos de sesión en localStorage:", e);
                }
            }
        });
    </script>
