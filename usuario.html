<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>

</head>
<body>

    <header class="navbar-siaf">

        </g>
    </svg>
    menu-heade
        </div>

        <div class="modulos-menu-wrapper" onclick="toggleModulosMenu(event)">
            <div class="modulos-display">
                <i class="ti ti-apps modulos-icon"></i>
                <div class="modulos-info-text">
                    <span class="modulos-label">MÓDULOS</span>
                    <span class="modulos-actual" id="modulo-actual-nombre">Cargando...</span>
                </div>
                <i class="ti ti-chevron-down arrow-modulos"></i>
            </div>

            <div id="modulosDropdown" class="modulos-dropdown">
                <div class="modulos-dropdown-title">MÓDULOS</div>
                <div id="modulosListado" class="modulos-listado"></div>
                <a href="home.html" class="modulos-ver-todos">Ver todos</a>
            </div>
        </div>

        <div class="user-menu-wrapper" onclick="toggleMenu(event)">
            <div class="user-display">
                <div class="user-info-text">
                    <span class="user-display-nombre" id="nav-nombre">USUARIO</span>
                    <span class="user-display-rol" id="nav-rol"></span>
                </div>
                <img src="img/arrow-down.svg" class="arrow-down">
            </div>
            
            <div id="userDropdown" class="user-dropdown">
                <a href="#" class="dropdown-item">👤 Editar perfil</a>
                <a href="#" class="dropdown-item">🎫 Tickets de soporte</a>
                <hr class="menu-divider">
                <a href="#" class="dropdown-item" onclick="cerrarSesion()">➡️ Cerrar sesión</a>
            </div>
        </div>
    </header>

    <div class="layout-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Menu</span>
            </div>
            <ul>
                <li><a href="#" class="active" onclick="cambiarVista('seccionUsuarios', this)"><i class="ti ti-users"></i>Usuarios registrados</a></li>
                <li><a href="#" onclick="cambiarVista('seccionCrear', this)"><i class="ti ti-user-plus"></i>Crear nuevo usuario</a></li>
                <li><a href="#" onclick="cambiarVista('seccionPermisos', this)"><i class="ti ti-lock"></i>Asignación de permisos</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div id="seccionCrear" style="display: none;">
                <h3>Crear Nuevo Usuario</h3>
                <section class="form-box">
                    <form id="formCrearUsuario">
                        <div class="form-group"><label>DNI:</label><input type="text" id="nuevoDni" maxlength="8" required></div>
                        <div class="form-group"><label>Nombres:</label><input type="text" id="nuevoNombres" required></div>
                        <div class="form-group"><label>Apellidos:</label><input type="text" id="nuevoApellidos" required></div>
                        <div class="form-group"><label>Correo:</label><input type="email" id="nuevoCorreo" required></div>
                        <div class="form-group"><label>Username:</label><input type="text" id="nuevoUser" required></div>
                        <div class="form-group"><label>Contraseña:</label><input type="password" id="nuevoPass" required></div>
                        <div class="form-group"><label>Telefono:</label><input type="text" id="nuevoTelefono"></div>
                        <div class="form-group"><label>Rol:</label><select id="selectRol" required></select></div>
                        <div class="button-container"><button type="submit" class="btn-blue">Guardar</button></div>
                    </form>
                </section>
            </div>

            <div id="seccionUsuarios" style="display: block;">
                <h3>Usuarios Registrados</h3>
                <section class="form-box">
                    <table id="tablaUsuarios">
                        <thead><tr><th>DNI</th><th>Nombres</th><th>Username</th><th>Rol</th></tr></thead>
                        <tbody id="cuerpoTabla"></tbody>
                    </table>
                </section>
            </div>
            
            <div id="seccionPermisos" style="display: none;">
                <h3>Asignación de Permisos</h3>
                <section class="form-box">
                    <div class="form-group">
                        <label>Seleccionar Usuario:</label>
                        <select id="selectUsuarioPermisos">
                            <option value="">-- Seleccione un usuario --</option>
                        </select>
                    </div>
                    <div id="contenedorPermisos" class="permisos-grid"></div>
                    <div class="button-container" style="margin-top: 20px;">
                        <button type="button" class="btn-blue" onclick="guardarPermisos()">Guardar</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        let usuariosData = [];
        let usuarioLogueado = null;

        const CATALOGO_MODULOS = [
            { nombre: 'SCIL', titulo: 'Inventario',              desc: 'Sistema de Control de Inventario Logístico',      icono: 'ti-boxes',              url: 'inventario.html' },
            { nombre: 'CAF',  titulo: 'Activos Fijos',           desc: 'Control de Activos Fijos',                        icono: 'ti-building-warehouse', url: 'patrimonio.html' },
            { nombre: 'SCIP', titulo: 'Control Interno',         desc: 'Sistema de control Interno de Productos',         icono: 'ti-shield-check',       url: 'admin.html' },
            { nombre: 'GUH',  titulo: 'Gestión de Usuarios',     desc: 'Gestión de Usuarios y Herramientas',              icono: 'ti-users',              url: 'usuario.html' },
            { nombre: 'CPF',  titulo: 'Prod. Farmacéuticos',     desc: 'Control de Productos Farmacéuticos',              icono: 'ti-vaccine',            url: 'admin.html' },
            { nombre: 'MR',   titulo: 'Reportes',                desc: 'Módulo de Reportes',                              icono: 'ti-report',             url: 'admin.html' },
        ];

        const MODULO_ACTUAL = 'GUH';

        document.addEventListener('DOMContentLoaded', () => {
            const data = localStorage.getItem('usuario');
            if (!data) {
                cerrarSesion();
                return;
            }
            
            usuarioLogueado = JSON.parse(data);

            const tieneAccesoAlModulo = usuarioLogueado.modulos_ids && usuarioLogueado.modulos_ids.includes(4);
            if (!tieneAccesoAlModulo) {
                alert("No tienes permiso para acceder al módulo Gestión de Usuarios.");
                window.location.href = 'home.html';
                return;
            }

            document.getElementById('nav-nombre').textContent = `${usuarioLogueado.nombres || ''} ${usuarioLogueado.apellidos || ''}`.trim();
            document.getElementById('nav-rol').textContent = usuarioLogueado.role || "Sin rol";

            pintarModulosDropdown();
            cargarRoles();
            cargarUsuarios(); 
            cargarUsuariosParaSelect();

            document.getElementById('selectUsuarioPermisos').addEventListener('change', cargarPermisosUsuario);
            
            document.getElementById('formCrearUsuario').addEventListener('submit', async (e) => {
                e.preventDefault();
                const datos = {
                    dni: document.getElementById('nuevoDni').value,
                    nombres: document.getElementById('nuevoNombres').value,
                    apellidos: document.getElementById('nuevoApellidos').value,
                    correo: document.getElementById('nuevoCorreo').value,
                    username: document.getElementById('nuevoUser').value,
                    pass: document.getElementById('nuevoPass').value,
                    telefono: document.getElementById('nuevoTelefono').value,
                    rol_id: document.getElementById('selectRol').value
                };

                const res = await fetch('http://localhost:3000/api/usuarios', {
                    method: 'POST',
                    headers: obtenerHeadersSeguros(),
                    body: JSON.stringify(datos)
                });
                if (res.ok) { 
                    alert('Usuario guardado con éxito'); 
                    document.getElementById('formCrearUsuario').reset(); 
                    cargarUsuarios(); 
                } else {
                    alert('Error o falta de permisos para procesar la acción.');
                }
            });
        });

        function obtenerHeadersSeguros() {
            return { 
                'Content-Type': 'application/json',
                'Authorization': usuarioLogueado && usuarioLogueado.token ? 'Bearer ' + usuarioLogueado.token : ''
            };
        }

        function cambiarVista(idSeccion, elemento) {
            document.getElementById('seccionCrear').style.display = 'none';
            document.getElementById('seccionUsuarios').style.display = 'none';
            document.getElementById('seccionPermisos').style.display = 'none';
            document.getElementById(idSeccion).style.display = 'block';
            
            if (idSeccion === 'seccionUsuarios') {
                cargarUsuarios();
            }

            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            elemento.classList.add('active');
        }

        async function cargarUsuarios() {
            const res = await fetch('http://localhost:3000/api/usuarios', { headers: obtenerHeadersSeguros() });
            if(res.status === 403 || res.status === 401) return cerrarSesion();
            
            const usuarios = await res.json();
            const body = document.getElementById('cuerpoTabla');
            body.innerHTML = '';
            usuarios.forEach(u => {
                const rol = u.rol_nombre || 'Sin Rol';
                const claseBadge = rol === 'Administrador' ? 'badge-admin' : 'badge-usuario';
                body.innerHTML += `<tr><td>${u.dni}</td><td>${u.nombres} ${u.apellidos}</td><td>${u.username}</td><td><span class="badge-rol ${claseBadge}">${rol}</span></td></tr>`;
            });
        }

        async function cargarUsuariosParaSelect() {
            const res = await fetch('http://localhost:3000/api/usuarios', { headers: obtenerHeadersSeguros() });
            if (!res.ok) return;
            usuariosData = await res.json(); 
            const select = document.getElementById('selectUsuarioPermisos');
            select.innerHTML = '<option value="">-- Seleccione un usuario --</option>';
            usuariosData.forEach(u => {
                select.innerHTML += `<option value="${u.usuario_id}">${u.nombres} ${u.apellidos}</option>`;
            });
        }

        async function cargarRoles() {
            const res = await fetch('http://localhost:3000/api/roles', { headers: obtenerHeadersSeguros() });
            if (!res.ok) return;
            const roles = await res.json();
            const select = document.getElementById('selectRol');
            select.innerHTML = '';
            roles.forEach(r => select.innerHTML += `<option value="${r.rol_id}">${r.nombre}</option>`);
        }

        async function cargarPermisosUsuario() {
            const userId = document.getElementById('selectUsuarioPermisos').value;
            const contenedor = document.getElementById('contenedorPermisos');
            if (!userId) { contenedor.innerHTML = ''; return; }

            try {
                const [resModulos, resPermisos] = await Promise.all([
                    fetch('http://localhost:3000/api/modulos', { headers: obtenerHeadersSeguros() }),
                    fetch(`http://localhost:3000/api/usuarios/${userId}/permisos`, { headers: obtenerHeadersSeguros() })
                ]);
                const modulos = await resModulos.json();
                const permisosUsuario = await resPermisos.json();

                contenedor.innerHTML = '';
                modulos.forEach(m => {
                    const checked = permisosUsuario.includes(m.id) ? 'checked' : '';
                    contenedor.innerHTML += `
                        <div class="permiso-item">
                            <input type="checkbox" class="permiso" data-modulo-id="${m.id}" ${checked}>
                            <label>${m.nombre}</label>
                        </div>`;
                });
            } catch (err) { console.error(err); }
        }

        async function guardarPermisos() {
            const userId = document.getElementById('selectUsuarioPermisos').value;
            if (!userId) return alert('Seleccione un usuario primero');

            const checkboxes = document.querySelectorAll('.permiso:checked');
            const modulosSeleccionados = Array.from(checkboxes).map(cb => cb.getAttribute('data-modulo-id'));

            try {
                const res = await fetch(`http://localhost:3000/api/usuarios/${userId}/permisos`, {
                    method: 'POST',
                    headers: obtenerHeadersSeguros(),
                    body: JSON.stringify({ modulos: modulosSeleccionados })
                });

                const data = await res.json();
                if (data.success) alert('Permisos guardados correctamente');
            } catch (err) {
                console.error(err);
            }
        }

        function toggleMenu(event) {
            event.stopPropagation(); 
            document.getElementById('userDropdown').classList.toggle('show');
        }

        function toggleModulosMenu(event) {
            event.stopPropagation();
            document.getElementById('modulosDropdown').classList.toggle('show');
        }

        function pintarModulosDropdown() {
            const modulosPermitidos = (usuarioLogueado && usuarioLogueado.modulos) || [];
            const listado = document.getElementById('modulosListado');
            const nombreActualSpan = document.getElementById('modulo-actual-nombre');

            const infoActual = CATALOGO_MODULOS.find(m => m.nombre === MODULO_ACTUAL);
            nombreActualSpan.textContent = infoActual ? infoActual.titulo : MODULO_ACTUAL;

            const modulosAsignados = CATALOGO_MODULOS.filter(m => modulosPermitidos.includes(m.nombre));

            listado.innerHTML = '';

            if (modulosAsignados.length === 0) {
                listado.innerHTML = '<div class="modulos-vacio">No tienes otros módulos asignados.</div>';
                return;
            }

            modulosAsignados.forEach(m => {
                const esActual = m.nombre === MODULO_ACTUAL;
                const item = document.createElement(esActual ? 'div' : 'a');
                if (!esActual) item.href = m.url;
                item.className = 'modulo-item' + (esActual ? ' activo' : '');
                item.innerHTML = `
                    <div class="modulo-icono"><i class="ti ${m.icono}"></i></div>
                    <div class="modulo-texto">
                        <span class="modulo-titulo">${m.titulo}</span>
                        <span class="modulo-desc">${m.desc}</span>
                    </div>`;
                listado.appendChild(item);
            });
        }

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('userDropdown');
            const wrapper = document.querySelector('.user-menu-wrapper');
            if (dropdown && wrapper && !wrapper.contains(event.target)) {
                dropdown.classList.remove('show');
            }

            const modulosDropdown = document.getElementById('modulosDropdown');
            const modulosWrapper = document.querySelector('.modulos-menu-wrapper');
            if (modulosDropdown && modulosWrapper && !modulosWrapper.contains(event.target)) {
                modulosDropdown.classList.remove('show');
            }
        });

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
